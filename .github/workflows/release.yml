name: Release Grove

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          find_bundles() {
            find "$GITHUB_WORKSPACE" -path '*/bundle/*' -type f 2>/dev/null
          }

          require_file() {
            local pattern="$1"
            local dest="$2"
            local file
            file="$(find "$GITHUB_WORKSPACE" -path "$pattern" -type f 2>/dev/null | head -n 1)"
            if [ -z "$file" ]; then
              echo "Could not find bundle matching: $pattern"
              echo "Bundle files discovered:"
              find_bundles || true
              exit 1
            fi
            cp "$file" "release-assets/$dest"
            echo "Copied $file -> release-assets/$dest"
          }

          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            require_file '*/bundle/nsis/*-setup.exe' 'Grove-x64-setup.exe'
            require_file '*/bundle/msi/*.msi' 'Grove-x64.msi'
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            require_file '*/bundle/dmg/*.dmg' 'Grove-aarch64.dmg'
          else
            require_file '*/bundle/appimage/*.AppImage' 'Grove-amd64.AppImage'
            require_file '*/bundle/deb/*.deb' 'Grove-amd64.deb'
          fi

          ls -la release-assets

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Grove ${{ github.ref_name }}
          body: |
            Desktop builds for Windows, macOS (Apple Silicon), and Linux.

            | Platform | File | Notes |
            | --- | --- | --- |
            | Windows | `Grove-x64-setup.exe` or `Grove-x64.msi` | Windows 10/11, 64-bit |
            | macOS | `Grove-aarch64.dmg` | Apple Silicon (M1/M2/M3). Unsigned — right-click → Open on first launch. |
            | Linux | `Grove-amd64.AppImage` or `Grove-amd64.deb` | Ubuntu/Debian and most distros |
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
