name: Feature request
description: Suggest an improvement or new capability for Grove
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Tell us what problem you're trying to solve — feature requests with context are the easiest to act on.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: e.g. I often need to reorder focus queue tasks without restarting the session...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like Grove to do?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Tasks
        - Focus / Pomodoro
        - Memo
        - Desktop / tray
        - Website
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional
