name: Bug report
description: Something in Grove isn't working as expected
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Describe the bug clearly so we can reproduce and fix it.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Grove version
      placeholder: e.g. 1.0.1
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Focus tab
        2. Start a Pomodoro session
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Screenshots or notes
      description: Optional — paste details, error messages, or attach screenshots after submitting
