<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic ToDo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: max(1.25rem, env(safe-area-inset-top)) 1.5rem max(5.5rem, calc(1.25rem + env(safe-area-inset-bottom)));
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        body.app-focus {
            padding: 0;
            padding-bottom: 0;
            align-items: stretch;
            justify-content: stretch;
            overflow: hidden;
        }

        .app-panel {
            display: none;
            width: 100%;
            flex: 1;
            position: relative;
        }

        .app-panel.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.app-focus .app-panel.active {
            display: block;
        }

        #tasksPanel.active {
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            width: 100%;
            min-height: calc(100dvh - 5rem);
        }

        #tasksPanel .bg {
            position: fixed;
        }

        .app-nav {
            position: fixed;
            bottom: max(14px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 400;
            display: flex;
            gap: 6px;
            padding: 5px;
            border-radius: 20px;
            background: rgba(5, 12, 8, 0.78);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }

        body.app-focus .app-nav {
            background: rgba(0, 0, 0, 0.45);
        }

        .app-nav-btn {
            padding: 11px 22px;
            border: none;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: rgba(200, 230, 210, 0.55);
            background: transparent;
            transition: all 0.22s ease;
            font-family: inherit;
        }

        .app-nav-btn.active {
            background: rgba(74, 222, 128, 0.2);
            color: #bbf7d0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        body.app-focus .app-nav-btn.active {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }

        /* —— Focus / Pomodoro —— */
        #focusPanel {
            position: fixed;
            inset: 0;
            z-index: 50;
        }

        .focus-bg {
            position: absolute;
            inset: 0;
            background-color: #0a120c;
            background-size: cover;
            background-position: center;
            transition: opacity 0.7s ease;
        }

        .focus-bg.switching {
            opacity: 0.65;
        }

        .focus-scrim {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(0, 0, 0, 0.62) 0%,
                    rgba(0, 0, 0, 0.2) 38%,
                    rgba(0, 0, 0, 0.35) 62%,
                    rgba(0, 0, 0, 0.72) 100%);
            pointer-events: none;
        }

        .focus-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: max(1.5rem, env(safe-area-inset-top)) 1.25rem max(5.75rem, calc(4.5rem + env(safe-area-inset-bottom)));
        }

        .focus-header {
            flex-shrink: 0;
            text-align: center;
            padding-top: 0.5rem;
        }

        .focus-phase {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 8px;
        }

        body.focus-running .focus-phase {
            color: rgba(187, 247, 208, 0.75);
        }

        body.focus-break .focus-phase {
            color: rgba(254, 215, 170, 0.8);
        }

        .focus-time {
            font-size: clamp(4.2rem, 20vw, 6rem);
            font-weight: 200;
            letter-spacing: -0.03em;
            color: rgba(255, 255, 255, 0.96);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 4px 40px rgba(0, 0, 0, 0.45);
        }

        .focus-workspace {
            margin-top: 22px;
            width: 100%;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }

        .focus-workspace .focus-scenes-label {
            margin-bottom: 8px;
        }

        .focus-select-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .focus-select-preview {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            background-color: rgba(0, 0, 0, 0.3);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        }

        .focus-select-wrap {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        .focus-select-wrap::after {
            content: "";
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 6px solid rgba(255, 255, 255, 0.55);
            pointer-events: none;
        }

        .focus-select {
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            padding: 13px 36px 13px 14px;
            border-radius: 14px;
            border: 0.5px solid rgba(255, 255, 255, 0.18);
            background: rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: rgba(255, 255, 255, 0.95);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .focus-select:hover {
            border-color: rgba(255, 255, 255, 0.28);
        }

        .focus-select:focus {
            outline: none;
            border-color: rgba(134, 239, 172, 0.45);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12);
        }

        .focus-select option {
            background: #0c1610;
            color: #fff;
        }

        .focus-spacer {
            flex: 1;
            min-height: 1rem;
        }

        .focus-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 1.75rem;
            flex-shrink: 0;
        }

        .focus-ctrl {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: transform 0.15s ease, background 0.2s;
            font-family: inherit;
        }

        .focus-ctrl:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: scale(1.04);
        }

        .focus-main-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(74, 222, 128, 0.35);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 40px rgba(74, 222, 128, 0.15);
            transition: transform 0.15s ease, background 0.2s;
            font-family: inherit;
        }

        body.focus-break .focus-main-btn {
            background: rgba(251, 191, 36, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 40px rgba(251, 191, 36, 0.12);
        }

        .focus-main-btn:hover {
            transform: scale(1.05);
        }

        .focus-main-btn:active {
            transform: scale(0.97);
        }

        .focus-scenes-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .focus-durations {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .focus-dur-btn {
            padding: 6px 12px;
            border-radius: 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: rgba(255, 255, 255, 0.55);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .focus-dur-btn.active {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.12);
        }

        .focus-dur-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #ffffff;
            transition: filter 0.6s ease;
        }

        body.mode-greenhouse .bg {
            filter: hue-rotate(-8deg) saturate(1.08);
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: drift linear infinite alternate;
            transition: opacity 0.6s ease;
        }

        body.mode-greenhouse .blob1 {
            opacity: 0.28;
            background: #a3e635;
        }

        body.mode-greenhouse .blob2 {
            opacity: 0.35;
            background: #fbbf24;
        }

        body.mode-greenhouse .blob5 {
            opacity: 0.28;
            background: #65a30d;
        }

        .blob1 {
            width: 500px;
            height: 500px;
            background: #4ade80;
            top: -120px;
            left: -140px;
            opacity: 0.35;
            animation-duration: 18s;
        }

        .blob2 {
            width: 420px;
            height: 420px;
            background: #86efac;
            bottom: -80px;
            right: -100px;
            opacity: 0.3;
            animation-duration: 23s;
            animation-delay: -6s;
        }

        .blob3 {
            width: 340px;
            height: 340px;
            background: #a3e635;
            bottom: 80px;
            left: 80px;
            opacity: 0.25;
            animation-duration: 29s;
            animation-delay: -11s;
        }

        .blob4 {
            width: 280px;
            height: 280px;
            background: #d9f99d;
            top: 100px;
            right: 60px;
            opacity: 0.3;
            animation-duration: 15s;
            animation-delay: -4s;
        }

        .blob5 {
            width: 220px;
            height: 220px;
            background: #166534;
            top: 40%;
            left: 40%;
            opacity: 0.2;
            animation-duration: 34s;
            animation-delay: -9s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(22px, -14px) scale(1.04);
            }

            50% {
                transform: translate(-10px, 25px) scale(0.97);
            }

            75% {
                transform: translate(30px, 10px) scale(1.06);
            }

            100% {
                transform: translate(-18px, -20px) scale(1.02);
            }
        }

        .task-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
            min-height: min(780px, calc(100dvh - 6.5rem));
            display: grid;
            grid-template-columns: minmax(260px, 300px) 1fr;
            grid-template-rows: auto 1fr;
            gap: 0 32px;
            padding: 28px 36px 32px;
            border-radius: 24px;
            background: rgba(5, 12, 8, 0.82);
            backdrop-filter: blur(48px) saturate(180%);
            -webkit-backdrop-filter: blur(48px) saturate(180%);
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.22),
                10px 10px 28px rgba(0, 0, 0, 0.18),
                inset 0 0 0 0.5px rgba(255, 255, 255, 0.08);
            transition: box-shadow 0.5s ease, background 0.5s ease;
        }

        body.mode-greenhouse .task-shell {
            background: rgba(12, 14, 6, 0.86);
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.25),
                0 0 48px rgba(163, 230, 53, 0.08),
                inset 0 0 0 0.5px rgba(217, 249, 157, 0.1);
        }

        .task-shell::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        body.mode-greenhouse .task-shell::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(165deg, rgba(251, 191, 36, 0.06) 0%, transparent 45%, rgba(74, 222, 128, 0.05) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .task-topbar {
            grid-column: 1 / -1;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 22px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.07);
            position: relative;
            z-index: 1;
        }

        .task-sidebar {
            display: flex;
            flex-direction: column;
            gap: 0;
            min-height: 0;
            position: relative;
            z-index: 1;
        }

        .task-sidebar .add-area {
            margin-top: auto;
            padding-top: 16px;
        }

        .task-main {
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        .layout-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .layout-toolbar-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(134, 200, 140, 0.45);
        }

        .layout-tabs {
            display: flex;
            gap: 6px;
            padding: 4px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.22);
            border: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        .layout-tab {
            padding: 7px 14px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: rgba(160, 200, 170, 0.55);
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.25s ease, background 0.3s ease, transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .layout-tab:hover {
            color: rgba(210, 235, 215, 0.85);
            background: rgba(255, 255, 255, 0.05);
        }

        .layout-tab.active {
            color: rgba(220, 250, 230, 0.95);
            background: rgba(74, 222, 128, 0.14);
            box-shadow: inset 0 0 0 0.5px rgba(134, 239, 172, 0.2);
        }

        body.mode-greenhouse .layout-tab.active {
            background: rgba(217, 249, 157, 0.12);
            box-shadow: inset 0 0 0 0.5px rgba(217, 249, 157, 0.22);
        }

        .header {
            margin-bottom: 0;
            position: relative;
            z-index: 1;
        }

        .greeting {
            font-size: 13px;
            color: rgba(134, 200, 120, 0.5);
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        body.mode-greenhouse .greeting {
            color: rgba(200, 180, 100, 0.55);
        }

        .title {
            font-size: clamp(1.75rem, 3vw, 2.25rem);
            font-weight: 600;
            color: rgba(210, 240, 215, 0.9);
            letter-spacing: -0.02em;
        }

        .title span {
            color: #86efac;
        }

        body.mode-greenhouse .title span {
            color: #d9f99d;
        }

        .view-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 0;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .task-topbar .view-tabs {
            min-width: 240px;
        }

        .view-tab {
            flex: 1;
            min-width: 108px;
            padding: 11px 16px;
            border: none;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(160, 200, 170, 0.5);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.4), -1px -1px 4px rgba(255, 255, 255, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .view-tab.active {
            background: rgba(74, 222, 128, 0.14);
            color: #86efac;
            box-shadow: inset 3px 3px 8px rgba(0, 0, 0, 0.4), inset -1px -1px 4px rgba(74, 222, 128, 0.08);
            border-color: rgba(74, 222, 128, 0.2);
        }

        body.mode-greenhouse .view-tab.active {
            background: rgba(217, 249, 157, 0.12);
            color: #d9f99d;
            border-color: rgba(217, 249, 157, 0.2);
        }

        .view-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.35);
            color: rgba(200, 230, 210, 0.7);
            min-width: 20px;
        }

        .view-tab:not(.active) .view-badge {
            opacity: 0.7;
        }

        .soil-meter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding: 10px 14px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.22);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
        }

        .soil-meter.full {
            border-color: rgba(251, 191, 36, 0.2);
            background: rgba(251, 191, 36, 0.06);
        }

        .soil-label {
            font-size: 12px;
            color: rgba(134, 200, 140, 0.55);
            font-weight: 500;
        }

        .soil-meter.full .soil-label {
            color: rgba(251, 191, 36, 0.75);
        }

        .soil-dots {
            display: flex;
            gap: 7px;
        }

        .soil-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.5);
            transition: all 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .soil-dot.filled {
            background: radial-gradient(circle at 35% 30%, #bbf7d0, #4ade80);
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .gh-hint {
            font-size: 12px;
            line-height: 1.45;
            color: rgba(180, 200, 120, 0.45);
            margin-bottom: 14px;
            padding: 0 4px;
            position: relative;
            z-index: 1;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .filters.hidden {
            display: none;
        }

        .priority-filters {
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .priority-filter-row {
            margin-bottom: 0;
        }

        .filter-btn {
            flex: 1;
            padding: 9px 0;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(160, 200, 170, 0.5);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.4), -1px -1px 4px rgba(255, 255, 255, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        .filter-btn.active {
            background: rgba(74, 222, 128, 0.12);
            color: #86efac;
            box-shadow: inset 3px 3px 8px rgba(0, 0, 0, 0.4), inset -1px -1px 4px rgba(74, 222, 128, 0.08);
            border-color: rgba(74, 222, 128, 0.18);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            min-height: 320px;
            overflow-y: auto;
            overflow-x: clip;
            padding: 4px 8px 28px 4px;
            margin: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(74, 222, 128, 0.25) transparent;
            position: relative;
            z-index: 1;
        }

        .task-list::-webkit-scrollbar {
            width: 6px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: rgba(74, 222, 128, 0.22);
            border-radius: 6px;
        }

        @media (min-width: 900px) {
            .task-list.layout-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 14px;
                align-content: start;
            }

            .task-list.layout-list .task-card {
                height: 100%;
            }
        }

        .task-list.layout-compact {
            display: flex;
            flex-direction: column;
            gap: 8px;

        .layout-kanban .task-card {

        .kanban-empty {
            padding: 20px 12px;

        .kanban-board.cols-1 {

        .task-card {
            border-radius: 18px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            user-select: none;
            position: relative;
            background: transparent;
            border: 0.5px solid transparent;
            transform: translateY(0);
            max-height: 120px;
            overflow: visible;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease,
                opacity 0.5s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.5s ease, margin 0.5s ease;
        }

        .task-card.gh-card {
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.18);
            border-color: rgba(217, 249, 157, 0.06);
        }

        .task-card.gh-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: linear-gradient(180deg, rgba(217, 249, 157, 0.5), rgba(74, 222, 128, 0.2));
            opacity: 0.6;
        }

        .task-card:not(.dismissing):hover {
            background: rgba(255, 255, 255, 0.05);
            animation: springUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 4px 4px 16px rgba(0, 0, 0, 0.5), -3px -3px 12px rgba(255, 255, 255, 0.03),
                inset 0 1px 0 rgba(255, 255, 255, 0.07);
        }

        .task-card.selected {
            background: rgba(74, 222, 128, 0.07);
            animation: springUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 4px 4px 16px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(134, 239, 172, 0.08);
        }

        body.mode-greenhouse .task-card.selected {
            background: rgba(217, 249, 157, 0.08);
        }

        @keyframes springUp {
            0% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-4px);
            }

            65% {
                transform: translateY(-1px);
            }

            80% {
                transform: translateY(-3px);
            }

            100% {
                transform: translateY(-2px);
            }
        }

        .task-card.done .task-title {
            color: rgba(120, 150, 130, 0.5);
        }

        .task-card.dismissing {
            opacity: 0;
            transform: translateX(60px) translateY(4px) rotate(1.5deg);
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin-bottom: 0 !important;
            pointer-events: none;
            overflow: hidden;
        }

        .task-card:not(.gh-card)::before,
        .task-card.gh-card::before {
            transition: background 0.55s ease, opacity 0.45s ease;
        }

        .task-card.priority-high:not(.gh-card)::before,
        .task-card.gh-card.priority-high::before {
            background: linear-gradient(180deg, rgba(255, 112, 112, 0.75), rgba(255, 112, 112, 0.2));
            opacity: 0.85;
        }

        .task-card.priority-med:not(.gh-card)::before,
        .task-card.gh-card.priority-med::before {
            background: linear-gradient(180deg, rgba(255, 176, 96, 0.75), rgba(255, 176, 96, 0.2));
            opacity: 0.85;
        }

        .task-card.priority-low:not(.gh-card)::before,
        .task-card.gh-card.priority-low::before {
            background: linear-gradient(180deg, rgba(74, 222, 128, 0.75), rgba(74, 222, 128, 0.2));
            opacity: 0.85;
        }

        .task-card:not(.gh-card)::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            opacity: 0;
            pointer-events: none;
        }

        .task-card.priority-high:not(.gh-card)::before,
        .task-card.priority-med:not(.gh-card)::before,
        .task-card.priority-low:not(.gh-card)::before {
            opacity: 0.85;
        }

        .task-tag-priority {
            transition: color 0.4s ease, opacity 0.35s ease;
        }

        .task-card.priority-pulse {
            animation: priorityCardPulse 0.55s ease;
        }

        @keyframes priorityCardPulse {
            0% {
                box-shadow: 4px 4px 16px rgba(0, 0, 0, 0.5), inset 0 0 0 0 rgba(134, 239, 172, 0);
            }

            45% {
                box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(134, 239, 172, 0.12);
            }

            100% {
                box-shadow: 4px 4px 16px rgba(0, 0, 0, 0.5), inset 0 0 0 0 rgba(134, 239, 172, 0);
            }
        }

        .seedling {
            width: 34px;
            height: 34px;

            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: rgba(217, 249, 157, 0.08);

        .check-wrap {
            width: 34px;

        .check-wrap.checked {
            background: rgba(74, 222, 128, 0.18);

        .check-icon {

            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transition: opacity 0.35s ease;

        .check-wrap.checked .check-icon {

        .task-body {
            flex: 1;
            min-width: 0;
        }

        .task-tag {
            font-size: 11px;
            font-weight: 500;

            text-transform: uppercase;

        .priority-bloom {

            z-index: 30;

        .priority-bloom.is-open,
        .priority-bloom.is-closing {
            z-index: 60;

        .task-card:has(.priority-bloom.is-closing) {
            z-index: 5;

        .priority-orb {
            width: 22px;
            height: 22px;
            padding: 0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .priority-orb:hover {
            transform: scale(1.08);
        }

        .priority-bloom.is-open .priority-orb {
            transform: scale(1.12);
        }

        .priority-orb-core {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .priority-orb-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .priority-bloom.is-open .priority-orb-ring,
        .priority-orb:hover .priority-orb-ring {
            opacity: 1;
            transform: scale(1);
        }

        .priority-orb.p-high .priority-orb-core {
            background: #ff7070;
            box-shadow: 0 0 12px rgba(255, 100, 100, 0.55);
        }

        .priority-orb.p-med .priority-orb-core {
            background: #ffb060;
            box-shadow: 0 0 12px rgba(255, 170, 80, 0.5);
        }

        .priority-orb.p-low .priority-orb-core {
            background: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.5);
        }

        .priority-orb.is-settling .priority-orb-core {
            animation: orbSettle 0.55s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        @keyframes orbSettle {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.35);
            }

            100% {
                transform: scale(1);
            }
        }

        .priority-tray {
            position: absolute;
            right: 0;
            top: calc(100% + 10px);
            display: flex;
            flex-direction: row;
            gap: 6px;
            padding: 5px;
            border-radius: 16px;
            background: rgba(8, 18, 10, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 36px rgba(0, 0, 0, 0.45);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px) scale(0.92);
            transform-origin: top right;
            transition: opacity 0.32s ease, transform 0.4s cubic-bezier(0.34, 1.35, 0.64, 1);
        }

        .priority-bloom.is-open .priority-tray {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .priority-bloom.is-closing .priority-tray {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px) scale(0.95);
        }

        .priority-choice {
            position: relative;
            border: none;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;

        .priority-bloom.is-open .priority-choice {

            animation-delay: calc(var(--i) * 0.06s);
        }

        @keyframes choiceBloom {
            from {
                opacity: 0;
                transform: translateY(-6px) scale(0.88);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

        .priority-choice-glow.p-med {

        .priority-choice-glow.p-low {
            background: #4ade80;

            margin-right: 6px;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.05), inset 0 0.5px 0 rgba(255, 255, 255, 0.25);
            vertical-align: middle;
            transform: translateY(-1px);
        }

        .task-tag .task-cat-label {
            color: rgba(200, 230, 210, 0.62);
        }

        .cat-section {
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .cat-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .cat-section-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(134, 200, 140, 0.45);
        }

        .cat-section-toggle {
            background: transparent;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            color: rgba(160, 200, 170, 0.55);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-family: inherit;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }

        .cat-section-toggle:hover {
            color: rgba(220, 250, 230, 0.9);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .cat-section-toggle.active {
            color: rgba(220, 250, 230, 0.95);
            background: rgba(74, 222, 128, 0.12);
            border-color: rgba(74, 222, 128, 0.22);
        }

        .cat-filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .cat-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 14px;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(160, 200, 170, 0.6);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s, background 0.25s, border-color 0.25s,
                transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .cat-chip:hover {
            color: rgba(220, 250, 230, 0.95);
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-1px);
        }

        .cat-chip.active {
            color: rgba(230, 250, 235, 0.98);
            background: rgba(74, 222, 128, 0.12);
            border-color: rgba(74, 222, 128, 0.22);
        }

        body.mode-greenhouse .cat-chip.active {
            background: rgba(217, 249, 157, 0.12);
            border-color: rgba(217, 249, 157, 0.22);
        }

        .cat-chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.1), inset 0 0.5px 0 rgba(255, 255, 255, 0.3);
        }

        .cat-manage {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease, margin-top 0.3s ease;
            max-height: 600px;
            margin-top: 4px;
        }

        .cat-manage.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        .cat-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
            border-radius: 9px;
            transition: background 0.2s ease;
            position: relative;
        }

        .cat-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .cat-row-color {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 0.5px solid rgba(255, 255, 255, 0.14);
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1), box-shadow 0.2s ease;
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.25);
            position: relative;
        }

        .cat-row-color:hover {
            transform: scale(1.12);
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.08);
        }

        .cat-row-name {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 0.5px solid transparent;
            color: rgba(210, 235, 215, 0.85);
            font-size: 12px;
            font-family: inherit;
            padding: 3px 4px;
            transition: border-color 0.2s ease;
            min-width: 0;
        }

        .cat-row-name:focus {
            outline: none;
            border-bottom-color: rgba(134, 239, 172, 0.5);
            color: rgba(230, 250, 235, 0.95);
        }

        .cat-row-delete {
            background: transparent;
            border: none;
            color: rgba(160, 200, 170, 0.4);
            font-size: 14px;
            cursor: pointer;
            padding: 1px 6px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.2s ease, color 0.2s ease, background 0.2s ease;
            font-family: inherit;
            line-height: 1;
        }

        .cat-row:hover .cat-row-delete {
            opacity: 1;
        }

        .cat-row-delete:hover {
            color: rgba(255, 160, 160, 0.92);
            background: rgba(255, 100, 100, 0.08);
        }

        .cat-color-pop {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background: rgba(8, 18, 10, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            z-index: 80;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: catPopIn 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        @keyframes catPopIn {
            from { opacity: 0; transform: translateY(-4px) scale(0.92); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .cat-color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.4, 0.64, 1), box-shadow 0.2s ease;
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.25);
        }

        .cat-color-swatch:hover {
            transform: scale(1.18);
        }

        .cat-color-swatch.active {
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.25),
                0 0 0 2px rgba(255, 255, 255, 0.55);
        }

        .cat-add-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
            margin-top: 2px;
        }

        .cat-add-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.22);
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 6px 9px;
            color: rgba(210, 235, 215, 0.9);
            font-size: 12px;
            font-family: inherit;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .cat-add-input:focus {
            outline: none;
            border-color: rgba(134, 239, 172, 0.4);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.08);
        }

        .cat-add-input::placeholder {
            color: rgba(120, 160, 130, 0.4);
        }

        /* Category chip in add area */
        .add-area .category-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            padding: 7px 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.32);
            border-radius: 12px;
            color: rgba(200, 230, 210, 0.82);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            max-width: 110px;
            letter-spacing: 0.02em;
            transition: background 0.2s ease, border-color 0.2s ease,
                transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .add-area .category-chip:hover {
            background: rgba(0, 0, 0, 0.42);
            border-color: rgba(255, 255, 255, 0.16);
            transform: translateY(-1px);
        }

        .category-chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.3);
        }

        .category-chip-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .category-chip-popover {
            position: fixed;
            z-index: 250;
            background: rgba(8, 18, 10, 0.95);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 6px;
            min-width: 200px;
            max-width: 260px;
            max-height: 60vh;
            overflow-y: auto;
            box-shadow: 0 12px 44px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(6px) scale(0.96);
            transform-origin: bottom right;
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.3s cubic-bezier(0.34, 1.35, 0.64, 1);
        }

        .category-chip-popover.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .category-chip-option {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
            color: rgba(210, 235, 215, 0.85);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
        }

        .category-chip-option:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .category-chip-option.active {
            background: rgba(74, 222, 128, 0.1);
            color: rgba(220, 250, 230, 0.95);
        }

        .category-chip-option-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: inset 0 0.5px 0 rgba(255, 255, 255, 0.3);
        }

        .category-chip-divider {
            height: 0.5px;
            background: rgba(255, 255, 255, 0.06);
            margin: 4px 6px;
        }

        .category-chip-new {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
        }

        .category-chip-new-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 6px 9px;
            color: rgba(210, 235, 215, 0.9);
            font-size: 12px;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .category-chip-new-input:focus {
            outline: none;
            border-color: rgba(134, 239, 172, 0.4);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.08);
        }

        .category-chip-new-input::placeholder {
            color: rgba(120, 160, 130, 0.4);
        }

        /* ===== Subtasks ===== */
        .task-card {
            flex-wrap: wrap;
            row-gap: 0;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease,
                opacity 0.5s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.5s ease, margin 0.5s ease;
        }

        .task-card.subtasks-expanded {
            max-height: 1200px;
        }

        .task-list.layout-list .task-card.subtasks-expanded,
        .task-list.layout-kanban .task-card.subtasks-expanded,
        .task-list.layout-eisenhower .task-card.subtasks-expanded {
            max-height: 1200px;
        }

        .subtask-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 6px;
            padding: 1px 7px;
            height: 17px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.22);
            color: rgba(170, 210, 180, 0.7);
            border-radius: 9px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.04em;
            vertical-align: middle;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease,
                transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.25s ease;
        }

        .subtask-pill:hover {
            background: rgba(0, 0, 0, 0.32);
            color: rgba(210, 240, 220, 0.95);
            border-color: rgba(134, 239, 172, 0.18);
            transform: translateY(-1px);
        }

        .subtask-pill.subtask-pill-done {
            background: rgba(74, 222, 128, 0.14);
            color: rgba(180, 240, 200, 0.95);
            border-color: rgba(74, 222, 128, 0.22);
        }

        .subtask-pill.subtask-pill-empty {
            opacity: 0;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.18);
        }

        .task-card:hover .subtask-pill.subtask-pill-empty,
        .task-card.subtasks-expanded .subtask-pill.subtask-pill-empty,
        .task-card.selected .subtask-pill.subtask-pill-empty {
            opacity: 0.6;
            pointer-events: auto;
        }

        .task-card .subtask-pill.subtask-pill-empty:hover {
            opacity: 1;
        }

        .subtask-pill-icon {
            font-size: 11px;
            line-height: 1;
            display: inline-block;
        }

        .subtask-region {
            flex-basis: 100%;
            width: 100%;
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.42s cubic-bezier(0.34, 1.18, 0.64, 1),
                margin-top 0.32s cubic-bezier(0.34, 1.18, 0.64, 1);
            margin-top: 0;
        }

        .task-card.subtasks-expanded .subtask-region {
            grid-template-rows: 1fr;
            margin-top: 8px;
        }

        .subtask-region-inner {
            overflow: hidden;
            min-height: 0;
            opacity: 0;
            padding-left: 48px;
            transition: opacity 0.32s ease 0.05s;
        }

        .task-card.gh-card .subtask-region-inner {
            padding-left: 14px;
        }

        .task-card.compact-card .subtask-region-inner {
            padding-left: 38px;
        }

        .task-card.subtasks-expanded .subtask-region-inner {
            opacity: 1;
        }

        .subtask-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px 0 0;
        }

        .subtask-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 6px 5px 4px;
            border-radius: 9px;
            transition: background 0.2s ease;
            animation: subtaskGrow 0.32s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .subtask-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        @keyframes subtaskGrow {
            from {
                opacity: 0;
                transform: translateY(-3px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .subtask-check {
            width: 19px;
            height: 19px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.25);
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.45),
                inset -1px -1px 2px rgba(255, 255, 255, 0.03);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .subtask-check.checked {
            background: rgba(74, 222, 128, 0.18);
            border-color: rgba(134, 239, 172, 0.22);
        }

        .subtask-check svg {
            width: 11px;
            height: 11px;
            stroke: #86efac;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .subtask-check.checked svg {
            opacity: 1;
        }

        .subtask-title {
            flex: 1;
            font-size: 13px;
            color: rgba(200, 230, 210, 0.82);
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.3s ease;
        }

        .subtask-row.done .subtask-title {
            color: rgba(120, 160, 135, 0.5);
            text-decoration: line-through;
        }

        .subtask-remove {
            background: transparent;
            border: none;
            color: rgba(160, 200, 170, 0.45);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.2s ease, color 0.2s ease, background 0.2s ease;
            font-family: inherit;
        }

        .subtask-row:hover .subtask-remove {
            opacity: 1;
        }

        .subtask-remove:hover {
            color: rgba(255, 160, 160, 0.9);
            background: rgba(255, 100, 100, 0.08);
        }

        .subtask-add-row {
            display: flex;
            align-items: center;
            margin-top: 4px;
            padding: 0 4px;
        }

        .subtask-add-btn {
            background: transparent;
            border: 0.5px dashed transparent;
            color: rgba(160, 210, 180, 0.45);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            padding: 5px 9px;
            border-radius: 8px;
            font-family: inherit;
            transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            width: 100%;
            text-align: left;
        }

        .subtask-add-btn:hover {
            color: rgba(220, 250, 230, 0.92);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(134, 239, 172, 0.16);
        }

        .subtask-add-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.22);
            border: 0.5px solid rgba(134, 239, 172, 0.22);
            border-radius: 9px;
            padding: 7px 10px;
            color: rgba(210, 235, 215, 0.92);
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            animation: subtaskGrow 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .subtask-add-input:focus {
            outline: none;
            border-color: rgba(134, 239, 172, 0.45);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
        }

        .subtask-add-row .subtask-add-input {
            display: none;
        }

        .subtask-add-row.editing .subtask-add-btn {
            display: none;
        }

        .subtask-add-row.editing .subtask-add-input {
            display: block;
        }

        .task-card.compact-card .subtask-row {
            padding: 3px 4px;
            gap: 8px;
        }

        .task-card.compact-card .subtask-title {
            font-size: 12px;
        }

        .task-card.compact-card .subtask-add-btn,
        .task-card.compact-card .subtask-add-input {
            font-size: 12px;
            padding: 5px 8px;
        }

        /* ===== Eisenhower matrix ===== */
        .task-list.layout-eisenhower {
            display: block;
            overflow: visible;
            padding-bottom: 12px;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 14px;
            align-items: stretch;
            min-height: 420px;
            padding-bottom: 6px;
        }

        .matrix-quadrant {
            display: flex;
            flex-direction: column;
            border-radius: 18px;
            border: 0.5px solid rgba(255, 255, 255, 0.07);
            background: rgba(0, 0, 0, 0.2);
            min-height: 200px;
            transition: border-color 0.3s ease, box-shadow 0.35s ease, background 0.35s ease;
            position: relative;
        }

        .matrix-quadrant.q-do {
            background: linear-gradient(160deg, rgba(255, 112, 112, 0.07), rgba(255, 112, 112, 0.02));
            border-color: rgba(255, 112, 112, 0.2);
        }

        .matrix-quadrant.q-schedule {
            background: linear-gradient(160deg, rgba(74, 222, 128, 0.07), rgba(74, 222, 128, 0.02));
            border-color: rgba(74, 222, 128, 0.2);
        }

        .matrix-quadrant.q-delegate {
            background: linear-gradient(160deg, rgba(255, 176, 96, 0.07), rgba(255, 176, 96, 0.02));
            border-color: rgba(255, 176, 96, 0.2);
        }

        .matrix-quadrant.q-eliminate {
            background: linear-gradient(160deg, rgba(160, 170, 180, 0.06), rgba(160, 170, 180, 0.015));
            border-color: rgba(160, 170, 180, 0.15);
        }

        .matrix-quadrant.drag-over {
            box-shadow: 0 0 0 2px rgba(134, 239, 172, 0.45),
                inset 0 0 30px rgba(134, 239, 172, 0.06);
            border-color: rgba(134, 239, 172, 0.5);
        }

        .matrix-quadrant-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 11px 14px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .matrix-quadrant-titles {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .matrix-quadrant-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .matrix-quadrant.q-do .matrix-quadrant-title {
            color: rgba(255, 160, 160, 0.92);
        }

        .matrix-quadrant.q-schedule .matrix-quadrant-title {
            color: rgba(134, 239, 172, 0.92);
        }

        .matrix-quadrant.q-delegate .matrix-quadrant-title {
            color: rgba(255, 200, 130, 0.92);
        }

        .matrix-quadrant.q-eliminate .matrix-quadrant-title {
            color: rgba(190, 200, 210, 0.85);
        }

        .matrix-quadrant-sub {
            font-size: 10px;
            color: rgba(180, 200, 190, 0.42);
            letter-spacing: 0.05em;

        .matrix-quadrant-count {

        .matrix-quadrant-body {

        .layout-eisenhower .task-card {

        .layout-eisenhower .task-card:active {

        .layout-eisenhower .task-card.dragging {

        @media (max-width: 820px) {
            body {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .task-shell {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr;
                gap: 0;
                padding: 22px 20px 24px;

</head>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const TODAY_CAP = 5;
        const STORAGE_KEY = "organic-todo-v2";
        const TIMER_STORAGE_KEY = "organic-todo-timer-v1";
        const PHOTOS_DIR = "photos/";

        const PRIORITY_ORDER = ["high", "med", "low"];
        const PRIORITIES = {
            high: { label: "High", order: 0 },
            med: { label: "Medium", order: 1 },
            low: { label: "Low", order: 2 },
        };

        const CATEGORY_COLORS = {
            green: "#4ade80",
            lime: "#a3e635",
            amber: "#fbbf24",
            rose: "#f87171",
            sky: "#38bdf8",
            violet: "#a78bfa",
            slate: "#94a3b8",
        };
        const CATEGORY_COLOR_KEYS = Object.keys(CATEGORY_COLORS);
        const DEFAULT_CATEGORY_LABEL = "General";
        const DEFAULT_CATEGORY_COLOR = "green";

        const TAG_COLOR_HINTS = {
            "Design": "violet",
            "Dev": "sky",
            "Planning": "amber",
            "Admin": "slate",
            "Task": "green",
        };

        const QUADRANTS = [
            { id: "do", label: "Do First", sub: "Urgent · Important", urgency: "urgent", importance: "important" },
            { id: "schedule", label: "Schedule", sub: "Important · Not urgent", urgency: "not-urgent", importance: "important" },
            { id: "delegate", label: "Delegate", sub: "Urgent · Not important", urgency: "urgent", importance: "not-important" },
            { id: "eliminate", label: "Eliminate", sub: "Not urgent · Not important", urgency: "not-urgent", importance: "not-important" },
        ];

        const FOCUS_SCENES = [
            { id: "coder", label: "Coder", file: "software developer.png" },
            { id: "design", label: "3D Design", file: "3D_designer.png" },
            { id: "writer", label: "Writer", file: "writer.png" },
            { id: "video", label: "Video", file: "video_editor.png" },
            { id: "music", label: "Music", file: "music_artist.png" },
            { id: "business", label: "Business", file: "stock manager.png" },
            { id: "student", label: "Student", file: "student.png" },
            { id: "teacher", label: "Teacher", file: "teacher.png" },
            { id: "botanist", label: "Botanist", file: "botanist.png" },
            { id: "robotics", label: "Robotics", file: "robotics.png" },
        ];

        const DEFAULT_BREAK_MIN = 5;

        const DEFAULT_TASKS = [
            { id: 1, title: "Review design mockups", tag: "Design", priority: "high", done: false, place: "today" },
            { id: 2, title: "Fix navbar layout bug", tag: "Dev", priority: "high", done: false, place: "today" },
            { id: 3, title: "Write sprint retrospective", tag: "Planning", priority: "med", done: false, place: "today" },
            { id: 4, title: "Update dependencies", tag: "Dev", priority: "low", done: false, place: "greenhouse" },
            { id: 5, title: "Send weekly report", tag: "Admin", priority: "med", done: true, place: "today" },
            { id: 6, title: "Sketch onboarding flow", tag: "Design", priority: "low", done: false, place: "greenhouse" },
        ];

        let tasks = [];
        let nextId = 10;
        let appTab = "tasks";
        let view = "today";
        let filter = "active";
        let priorityFilter = "all";
        let taskLayout = "list";
        const TASK_LAYOUTS = ["list", "kanban", "compact", "eisenhower"];
        let selected = null;
        let priorityMenuId = null;
        let toastTimer = null;

        let categories = [];
        let defaultCategoryId = null;
        let categoryFilters = new Set();
        let catManageOpen = false;
        let catColorPopId = null;

        const expandedSubtasks = new Set();
        const editingSubtaskAdd = new Set();

        let dragTaskId = null;
        let categoryChipOpen = false;
        let categoryChipNewMode = false;

        let timerTickInterval = null;
        let timerState = {
            sceneId: "coder",
            workMinutes: 25,
            breakMinutes: DEFAULT_BREAK_MIN,
            phase: "work",
            running: false,
            endsAt: null,
            secondsLeft: 25 * 60,
        };

        const list = document.getElementById("taskList");
        const input = document.getElementById("addInput");
        const soilMeter = document.getElementById("soilMeter");
        const soilLabel = document.getElementById("soilLabel");
        const soilDots = document.getElementById("soilDots");
        const ghHint = document.getElementById("ghHint");
        const todayFilters = document.getElementById("todayFilters");
        const ghBadge = document.getElementById("ghBadge");
        const actionBar = document.getElementById("actionBar");
        const pageTitle = document.getElementById("pageTitle");
        const greeting = document.getElementById("greeting");

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function photoUrl(file) {
            return PHOTOS_DIR + encodeURIComponent(file);
        }

        function formatTimerDisplay(totalSeconds) {
            const s = Math.max(0, Math.floor(totalSeconds));
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m}:${sec.toString().padStart(2, "0")}`;
        }

        function phaseDurationSeconds() {
            return (timerState.phase === "work" ? timerState.workMinutes : timerState.breakMinutes) * 60;
        }

        function getScene(id) {
            return FOCUS_SCENES.find(s => s.id === id) || FOCUS_SCENES[0];
        }

        function loadTimer() {
            try {
                const raw = localStorage.getItem(TIMER_STORAGE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                timerState = { ...timerState, ...data };
                if (timerState.running && timerState.endsAt) {
                    const left = Math.ceil((timerState.endsAt - Date.now()) / 1000);
                    if (left <= 0) {
                        timerState.running = false;
                        timerState.endsAt = null;
                        timerState.secondsLeft = 0;
                    } else {
                        timerState.secondsLeft = left;
                    }
                }
            } catch { /* keep defaults */ }
        }

        function saveTimer() {
            localStorage.setItem(TIMER_STORAGE_KEY, JSON.stringify({
                sceneId: timerState.sceneId,
                workMinutes: timerState.workMinutes,
                breakMinutes: timerState.breakMinutes,
                phase: timerState.phase,
                running: timerState.running,
                endsAt: timerState.endsAt,
                secondsLeft: timerState.secondsLeft,
            }));
        }

        function syncFocusSceneUI() {
            const scene = getScene(timerState.sceneId);
            const select = document.getElementById("focusSceneSelect");
            if (select && select.value !== timerState.sceneId) {
                select.value = timerState.sceneId;
            }
            const preview = document.getElementById("focusSelectPreview");
            if (preview) {
                preview.style.backgroundImage = `url("${photoUrl(scene.file)}")`;
            }
        }

        function applyFocusBackground() {
            const scene = getScene(timerState.sceneId);
            const bg = document.getElementById("focusBg");
            bg.classList.add("switching");
            bg.style.backgroundImage = `url("${photoUrl(scene.file)}")`;
            syncFocusSceneUI();
            requestAnimationFrame(() => {
                setTimeout(() => bg.classList.remove("switching"), 50);
            });
        }

        function updateTimerUI() {
            const left = timerState.running && timerState.endsAt
                ? Math.max(0, Math.ceil((timerState.endsAt - Date.now()) / 1000))
                : timerState.secondsLeft;

            document.getElementById("focusTime").textContent = formatTimerDisplay(left);
            document.getElementById("focusPhase").textContent =
                timerState.phase === "work" ? "Focus" : "Break";
            document.getElementById("focusMain").textContent =
                timerState.running ? "Pause" : (left === 0 ? "Continue" : "Start");

            document.body.classList.toggle("focus-running", timerState.running && timerState.phase === "work");
            document.body.classList.toggle("focus-break", timerState.phase === "break");

            document.querySelectorAll(".focus-dur-btn").forEach(btn => {
                const mins = +btn.dataset.work;
                btn.classList.toggle("active", mins === timerState.workMinutes);
                btn.disabled = timerState.running;
            });
        }

        function stopTimerTick() {
            if (timerTickInterval) {
                clearInterval(timerTickInterval);
                timerTickInterval = null;
            }
        }

        function startTimerTick() {
            stopTimerTick();
            timerTickInterval = setInterval(() => {
                if (!timerState.running) return;
                const left = Math.max(0, Math.ceil((timerState.endsAt - Date.now()) / 1000));
                timerState.secondsLeft = left;
                if (left <= 0) {
                    onTimerPhaseComplete();
                } else {
                    updateTimerUI();
                }
            }, 200);
        }

        function onTimerPhaseComplete() {
            timerState.running = false;
            timerState.endsAt = null;
            stopTimerTick();

            if (timerState.phase === "work") {
                timerState.phase = "break";
                timerState.secondsLeft = timerState.breakMinutes * 60;
                showToast("Focus block done — take a break");
            } else {
                timerState.phase = "work";
                timerState.secondsLeft = timerState.workMinutes * 60;
                showToast("Break over — ready to focus");
            }
            saveTimer();
            updateTimerUI();
        }

        function startTimer() {
            if (timerState.secondsLeft <= 0) {
                timerState.secondsLeft = phaseDurationSeconds();
            }
            timerState.running = true;
            timerState.endsAt = Date.now() + timerState.secondsLeft * 1000;
            saveTimer();
            startTimerTick();
            updateTimerUI();
        }

        function pauseTimer() {
            if (timerState.running && timerState.endsAt) {
                timerState.secondsLeft = Math.max(0, Math.ceil((timerState.endsAt - Date.now()) / 1000));
            }
            timerState.running = false;
            timerState.endsAt = null;
            stopTimerTick();
            saveTimer();
            updateTimerUI();
        }

        function resetTimer() {
            pauseTimer();
            timerState.phase = "work";
            timerState.secondsLeft = timerState.workMinutes * 60;
            saveTimer();
            updateTimerUI();
        }

        function skipTimerPhase() {
            pauseTimer();
            timerState.secondsLeft = 0;
            onTimerPhaseComplete();
        }

        function setWorkDuration(minutes) {
            if (timerState.running) return;
            timerState.workMinutes = minutes;
            if (timerState.phase === "work") {
                timerState.secondsLeft = minutes * 60;
            }
            saveTimer();
            updateTimerUI();
        }

        function setFocusScene(id) {
            timerState.sceneId = id;
            applyFocusBackground();
            saveTimer();
            updateTimerUI();
        }

        function initFocusSelect() {
            const select = document.getElementById("focusSceneSelect");
            select.innerHTML = FOCUS_SCENES.map(s =>
                `<option value="${s.id}">${escapeHtml(s.label)}</option>`
            ).join("");
            select.value = timerState.sceneId;
            select.addEventListener("change", () => setFocusScene(select.value));
        }

        function initFocus() {
            loadTimer();
            if (!timerState.secondsLeft) {
                timerState.secondsLeft = timerState.workMinutes * 60;
            }
            initFocusSelect();
            applyFocusBackground();
            updateTimerUI();
            if (timerState.running && timerState.endsAt) {
                startTimerTick();
            }
            FOCUS_SCENES.forEach(s => {
                const img = new Image();
                img.src = photoUrl(s.file);
            });
        }

        function setAppTab(tab) {
            appTab = tab;
            document.body.classList.toggle("app-focus", tab === "focus");
            document.getElementById("tasksPanel").classList.toggle("active", tab === "tasks");
            document.getElementById("focusPanel").classList.toggle("active", tab === "focus");
            document.getElementById("focusPanel").setAttribute("aria-hidden", tab !== "focus");
            document.querySelectorAll(".app-nav-btn").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.app === tab);
            });
            if (tab === "tasks") {
                render();
            } else {
                updateTimerUI();
            }
        }

        function genId(prefix) {
            return `${prefix}-${Date.now().toString(36)}-${Math.floor(Math.random() * 1e6).toString(36)}`;
        }

        function slugify(s) {
            return String(s || "")
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "")
                .slice(0, 32) || "cat";
        }

        function load() {
            let data = null;
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) data = JSON.parse(raw);
            } catch {
                data = null;
            }

            if (!data) {
                tasks = structuredClone(DEFAULT_TASKS);
            } else {
                tasks = Array.isArray(data.tasks) ? data.tasks : structuredClone(DEFAULT_TASKS);
                if (typeof data.nextId === "number") nextId = data.nextId;
                if (TASK_LAYOUTS.includes(data.taskLayout)) taskLayout = data.taskLayout;
            }

            categories = (data && Array.isArray(data.categories)) ? data.categories.filter(c => c && c.id) : [];
            defaultCategoryId = (data && typeof data.defaultCategoryId === "string") ? data.defaultCategoryId : null;
            catManageOpen = !!(data && data.catManageOpen);

            if (data && Array.isArray(data.categoryFilters)) {
                categoryFilters = new Set(data.categoryFilters);
            } else {
                categoryFilters = new Set();
            }

            migrateTasksAndCategories();

            nextId = Math.max(nextId || 0, ...tasks.map(t => +t.id || 0)) + 1;
        }

        function migrateTasksAndCategories() {
            const seenLabels = new Map(categories.map(c => [c.label.toLowerCase(), c]));
            const colorRotation = [...CATEGORY_COLOR_KEYS];
            let rotIdx = 0;
            const pickColor = (hint) => {
                if (hint && CATEGORY_COLORS[hint]) return hint;
                const c = colorRotation[rotIdx % colorRotation.length];
                rotIdx++;
                return c;
            };

            const ensureCat = (label) => {
                const norm = (label || DEFAULT_CATEGORY_LABEL).trim() || DEFAULT_CATEGORY_LABEL;
                const key = norm.toLowerCase();
                let cat = seenLabels.get(key);
                if (cat) return cat;
                const colorHint = TAG_COLOR_HINTS[norm];
                cat = {
                    id: `cat-${slugify(norm)}-${Math.floor(Math.random() * 1e4).toString(36)}`,
                    label: norm,
                    color: pickColor(colorHint),
                };
                categories.push(cat);
                seenLabels.set(key, cat);
                return cat;
            };

            tasks.forEach(t => {
                if (!t.place) t.place = "today";
                t.priority = normalizePriority(t.priority);
                t.done = !!t.done;

                if (typeof t.urgency !== "string" || (t.urgency !== "urgent" && t.urgency !== "not-urgent")) {
                    t.urgency = (t.priority === "high" || t.priority === "med") ? "urgent" : "not-urgent";
                }
                if (typeof t.importance !== "string" || (t.importance !== "important" && t.importance !== "not-important")) {
                    t.importance = "important";
                }

                if (!Array.isArray(t.subtasks)) t.subtasks = [];
                t.subtasks = t.subtasks
                    .filter(s => s && typeof s.title === "string")
                    .map(s => ({
                        id: s.id || genId("st"),
                        title: String(s.title).slice(0, 200),
                        done: !!s.done,
                    }));

                if (!t.categoryId || !categories.find(c => c.id === t.categoryId)) {
                    const labelHint = t.tag || DEFAULT_CATEGORY_LABEL;
                    const cat = ensureCat(labelHint);
                    t.categoryId = cat.id;
                }

                delete t.tag;
            });

            if (!categories.length) {
                ensureCat(DEFAULT_CATEGORY_LABEL);
            }

            if (!defaultCategoryId || !categories.find(c => c.id === defaultCategoryId)) {
                const general = categories.find(c => c.label.toLowerCase() === DEFAULT_CATEGORY_LABEL.toLowerCase())
                    || categories.find(c => c.label === "Task")
                    || categories[0];
                defaultCategoryId = general ? general.id : null;
            }

            categoryFilters = new Set([...categoryFilters].filter(id => categories.find(c => c.id === id)));
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                tasks,
                nextId,
                taskLayout,
                categories,
                defaultCategoryId,
                categoryFilters: [...categoryFilters],
                catManageOpen,
            }));
        }

        // ===== Categories =====
        function getCategory(id) {
            return categories.find(c => c.id === id) || null;
        }

        function categoryColorHex(catId) {
            const c = getCategory(catId);
            if (!c) return CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR];
            return CATEGORY_COLORS[c.color] || CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR];
        }

        function getDefaultCategory() {
            return getCategory(defaultCategoryId) || categories[0] || null;
        }

        function ensureGeneralCategory() {
            let general = categories.find(c => c.label.toLowerCase() === DEFAULT_CATEGORY_LABEL.toLowerCase());
            if (general) return general;
            general = {
                id: `cat-general-${Math.floor(Math.random() * 1e4).toString(36)}`,
                label: DEFAULT_CATEGORY_LABEL,
                color: DEFAULT_CATEGORY_COLOR,
            };
            categories.push(general);
            return general;
        }

        function createCategoryFromLabel(label) {
            const norm = (label || "").trim().slice(0, 24);
            if (!norm) return null;
            const dup = categories.find(c => c.label.toLowerCase() === norm.toLowerCase());
            if (dup) return dup;
            const usedColors = new Set(categories.map(c => c.color));
            const nextColor = CATEGORY_COLOR_KEYS.find(k => !usedColors.has(k)) || CATEGORY_COLOR_KEYS[categories.length % CATEGORY_COLOR_KEYS.length];
            const cat = {
                id: `cat-${slugify(norm)}-${Math.floor(Math.random() * 1e4).toString(36)}`,
                label: norm,
                color: nextColor,
            };
            categories.push(cat);
