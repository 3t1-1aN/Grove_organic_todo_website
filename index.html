            return cat;
        }

        function renameCategory(id, label) {
            const c = getCategory(id);
            if (!c) return;
            const norm = (label || "").trim().slice(0, 24);
            if (!norm) return;
            const dup = categories.find(x => x.id !== id && x.label.toLowerCase() === norm.toLowerCase());
            if (dup) {
                showToast("That name is already taken");
                return;
            }
            c.label = norm;
            save();
        }

        function recolorCategory(id, colorKey) {
            const c = getCategory(id);
            if (!c || !CATEGORY_COLORS[colorKey]) return;
            c.color = colorKey;
            save();
        }

        function deleteCategoryById(id) {
            const c = getCategory(id);
            if (!c) return;
            if (categories.length <= 1) {
                showToast("Keep at least one category");
                return;
            }
            categories = categories.filter(x => x.id !== id);
            const fallback = ensureGeneralCategory();
            if (fallback.id === id) {
                // shouldn't happen since we filtered above, but guard
                return;
            }
            tasks.forEach(t => {
                if (t.categoryId === id) t.categoryId = fallback.id;
            });
            categoryFilters.delete(id);
            if (defaultCategoryId === id) defaultCategoryId = fallback.id;
            save();
        }

        function setDefaultCategory(id) {
            if (!getCategory(id)) return;
            defaultCategoryId = id;
            save();
        }

        // ===== Quadrants (Eisenhower) =====
        function getTaskQuadrantId(t) {
            const u = t.urgency === "urgent" ? "urgent" : "not-urgent";
            const i = t.importance === "important" ? "important" : "not-important";
            if (u === "urgent" && i === "important") return "do";
            if (u === "not-urgent" && i === "important") return "schedule";
            if (u === "urgent" && i === "not-important") return "delegate";
            return "eliminate";
        }

        function setTaskQuadrant(taskId, quadrantId) {
            const q = QUADRANTS.find(x => x.id === quadrantId);
            const t = tasks.find(x => x.id === taskId);
            if (!q || !t) return;
            const changed = t.urgency !== q.urgency || t.importance !== q.importance;
            t.urgency = q.urgency;
            t.importance = q.importance;
            if (changed) {
                save();
                render();
            }
        }

        // ===== Subtasks =====
        function subtaskPillHtml(task) {
            const expanded = expandedSubtasks.has(task.id);
            const total = task.subtasks?.length || 0;
            const done = task.subtasks?.filter(s => s.done).length || 0;
            if (total === 0) {
                return `<button type="button" class="subtask-pill subtask-pill-empty"
                    data-subtask-toggle="${task.id}" aria-expanded="${expanded}"
                    title="Add subtask"><span class="subtask-pill-icon">${expanded ? "▾" : "+"}</span></button>`;
            }
            const allDone = done === total && total > 0;
            const cls = "subtask-pill" + (allDone ? " subtask-pill-done" : "");
            const arrow = expanded ? "▾" : "▸";
            const icon = allDone ? "✓" : arrow;
            return `<button type="button" class="${cls}" data-subtask-toggle="${task.id}"
                aria-expanded="${expanded}" title="Toggle subtasks">
                <span class="subtask-pill-icon">${icon}</span>
                <span class="subtask-pill-count">${done}/${total}</span>
            </button>`;
        }

        function subtaskRegionHtml(task) {
            const editing = editingSubtaskAdd.has(task.id);
            const rows = (task.subtasks || []).map(s => `
                <div class="subtask-row${s.done ? " done" : ""}" data-subtask-id="${s.id}">
                    <div class="subtask-check${s.done ? " checked" : ""}" data-subtask-check="${task.id}|${s.id}" role="checkbox" aria-checked="${s.done}" tabindex="0">
                        <svg viewBox="0 0 16 16" aria-hidden="true"><polyline points="2.5,8.5 6.5,12.5 13.5,4.5"/></svg>
                    </div>
                    <div class="subtask-title">${escapeHtml(s.title)}</div>
                    <button type="button" class="subtask-remove" data-subtask-remove="${task.id}|${s.id}"
                        aria-label="Remove subtask">×</button>
                </div>
            `).join("");
            return `<div class="subtask-region" data-subtask-region="${task.id}">
                <div class="subtask-region-inner">
                    <div class="subtask-list">${rows}</div>
                    <div class="subtask-add-row${editing ? " editing" : ""}" data-subtask-add-row="${task.id}">
                        <button type="button" class="subtask-add-btn" data-subtask-add-btn="${task.id}">+ Add subtask</button>
                        <input type="text" class="subtask-add-input" data-subtask-add-input="${task.id}"
                            placeholder="New subtask…" maxlength="120" autocomplete="off" />
                    </div>
                </div>
            </div>`;
        }

        function toggleSubtaskExpanded(taskId) {
            const t = tasks.find(x => x.id === taskId);
            const wasExpanded = expandedSubtasks.has(taskId);
            if (wasExpanded) {
                expandedSubtasks.delete(taskId);
                editingSubtaskAdd.delete(taskId);
            } else {
                expandedSubtasks.add(taskId);
                if (t && (!t.subtasks || t.subtasks.length === 0)) {
                    editingSubtaskAdd.add(taskId);
                }
            }
            const card = list.querySelector(`.task-card[data-id="${taskId}"]`);
            if (card) {
                card.classList.toggle("subtasks-expanded", expandedSubtasks.has(taskId));
                const pill = card.querySelector(`[data-subtask-toggle="${taskId}"]`);
                if (pill) {
                    const expanded = expandedSubtasks.has(taskId);
                    pill.setAttribute("aria-expanded", expanded);
                    const total = t?.subtasks?.length || 0;
                    const done = t?.subtasks?.filter(s => s.done).length || 0;
                    const allDone = total > 0 && done === total;
                    const iconEl = pill.querySelector(".subtask-pill-icon");
                    if (iconEl) {
                        iconEl.textContent = total === 0
                            ? (expanded ? "▾" : "+")
                            : (allDone ? "✓" : (expanded ? "▾" : "▸"));
                    }
                }
                const addRow = card.querySelector(`[data-subtask-add-row="${taskId}"]`);
                if (addRow) {
                    addRow.classList.toggle("editing", editingSubtaskAdd.has(taskId));
                    if (editingSubtaskAdd.has(taskId)) {
                        const inp = card.querySelector(`[data-subtask-add-input="${taskId}"]`);
                        if (inp) {
                            setTimeout(() => inp.focus(), 220);
                        }
                    }
                }
            }
        }

        function addSubtaskToTask(taskId, title) {
            const t = tasks.find(x => x.id === taskId);
            if (!t) return;
            const trimmed = String(title || "").trim().slice(0, 120);
            if (!trimmed) return;
            if (!Array.isArray(t.subtasks)) t.subtasks = [];
            t.subtasks.push({ id: genId("st"), title: trimmed, done: false });
            save();
            renderSubtaskRegion(taskId);
            updateSubtaskPill(taskId);
        }

        function toggleSubtaskDone(taskId, subtaskId) {
            const t = tasks.find(x => x.id === taskId);
            if (!t) return;
            const s = (t.subtasks || []).find(x => x.id === subtaskId);
            if (!s) return;
            s.done = !s.done;
            save();
            const row = list.querySelector(`.task-card[data-id="${taskId}"] .subtask-row[data-subtask-id="${subtaskId}"]`);
            if (row) {
                row.classList.toggle("done", s.done);
                const check = row.querySelector(".subtask-check");
                if (check) {
                    check.classList.toggle("checked", s.done);
                    check.setAttribute("aria-checked", s.done);
                }
            }
            updateSubtaskPill(taskId);
        }

        function removeSubtaskFromTask(taskId, subtaskId) {
            const t = tasks.find(x => x.id === taskId);
            if (!t) return;
            t.subtasks = (t.subtasks || []).filter(s => s.id !== subtaskId);
            save();
            renderSubtaskRegion(taskId);
            updateSubtaskPill(taskId);
        }

        function renderSubtaskRegion(taskId) {
            const t = tasks.find(x => x.id === taskId);
            const card = list.querySelector(`.task-card[data-id="${taskId}"]`);
            if (!t || !card) return;
            const region = card.querySelector(`[data-subtask-region="${taskId}"]`);
            if (!region) return;
            region.outerHTML = subtaskRegionHtml(t);
            bindSubtaskEvents(card, t);
            if (editingSubtaskAdd.has(taskId)) {
                const inp = card.querySelector(`[data-subtask-add-input="${taskId}"]`);
                if (inp) {
                    inp.focus();
                    inp.value = "";
                }
            }
        }

        function updateSubtaskPill(taskId) {
            const t = tasks.find(x => x.id === taskId);
            const card = list.querySelector(`.task-card[data-id="${taskId}"]`);
            if (!t || !card) return;
            const tagEl = card.querySelector(".task-tag");
            if (!tagEl) return;
            const oldPill = tagEl.querySelector(".subtask-pill");
            if (oldPill) oldPill.remove();
            tagEl.insertAdjacentHTML("beforeend", subtaskPillHtml(t));
            const newPill = tagEl.querySelector(".subtask-pill");
            if (newPill) {
                newPill.addEventListener("click", e => {
                    e.stopPropagation();
                    toggleSubtaskExpanded(t.id);
                });
            }
        }

        function bindSubtaskEvents(card, task) {
            card.querySelectorAll(`[data-subtask-check]`).forEach(el => {
                el.addEventListener("click", e => {
                    e.stopPropagation();
                    const [tid, sid] = el.dataset.subtaskCheck.split("|");
                    toggleSubtaskDone(+tid, sid);
                });
                el.addEventListener("keydown", e => {
                    if (e.key === " " || e.key === "Enter") {
                        e.preventDefault();
                        e.stopPropagation();
                        const [tid, sid] = el.dataset.subtaskCheck.split("|");
                        toggleSubtaskDone(+tid, sid);
                    }
                });
            });
            card.querySelectorAll(`[data-subtask-remove]`).forEach(el => {
                el.addEventListener("click", e => {
                    e.stopPropagation();
                    const [tid, sid] = el.dataset.subtaskRemove.split("|");
                    removeSubtaskFromTask(+tid, sid);
                });
            });

            const addBtn = card.querySelector(`[data-subtask-add-btn="${task.id}"]`);
            const addInp = card.querySelector(`[data-subtask-add-input="${task.id}"]`);
            const addRow = card.querySelector(`[data-subtask-add-row="${task.id}"]`);
            if (addBtn) {
                addBtn.addEventListener("click", e => {
                    e.stopPropagation();
                    editingSubtaskAdd.add(task.id);
                    addRow.classList.add("editing");
                    if (addInp) {
                        addInp.value = "";
                        requestAnimationFrame(() => addInp.focus());
                    }
                });
            }
            if (addInp) {
                addInp.addEventListener("click", e => e.stopPropagation());
                addInp.addEventListener("keydown", e => {
                    e.stopPropagation();
                    if (e.key === "Enter") {
                        const v = addInp.value;
                        if (v.trim()) {
                            addSubtaskToTask(task.id, v);
                            const fresh = list.querySelector(`[data-subtask-add-input="${task.id}"]`);
                            if (fresh) {
                                fresh.value = "";
                                requestAnimationFrame(() => fresh.focus());
                            }
                        }
                    } else if (e.key === "Escape") {
                        editingSubtaskAdd.delete(task.id);
                        addRow.classList.remove("editing");
                        addInp.blur();
                    }
                });
                addInp.addEventListener("blur", () => {
                    setTimeout(() => {
                        if (document.activeElement !== addInp) {
                            editingSubtaskAdd.delete(task.id);
                            addRow.classList.remove("editing");
                        }
                    }, 50);
                });
            }
        }

        // ===== Eisenhower matrix render =====
        function renderEisenhowerMatrix(visible) {
            const inGh = view === "greenhouse";
            const buckets = Object.fromEntries(QUADRANTS.map(q => [q.id, []]));
            visible.forEach(t => buckets[getTaskQuadrantId(t)].push(t));

            const cols = QUADRANTS.map(q => {
                const items = sortByPriority(buckets[q.id]);
                const cards = items.length
                    ? items.map(t => renderTaskCard(t, { inGreenhouse: inGh, compact: false })).join("")
                    : `<div class="matrix-empty">Drop tasks here</div>`;
                return `<section class="matrix-quadrant q-${q.id}" data-quadrant="${q.id}"
                    aria-label="${q.label} — ${q.sub}">
                    <header class="matrix-quadrant-head">
                        <div class="matrix-quadrant-titles">
                            <span class="matrix-quadrant-title">${q.label}</span>
                            <span class="matrix-quadrant-sub">${q.sub}</span>
                        </div>
                        <span class="matrix-quadrant-count">${items.length}</span>
                    </header>
                    <div class="matrix-quadrant-body" data-quadrant-body="${q.id}">${cards}</div>
                </section>`;
            }).join("");

            return `<div class="matrix-grid">${cols}</div>`;
        }

        function bindMatrixEvents() {
            list.querySelectorAll(".task-card").forEach(card => {
                card.setAttribute("draggable", "true");
                card.addEventListener("dragstart", e => {
                    if (e.target.closest(".priority-bloom") ||
                        e.target.closest(".subtask-region") ||
                        e.target.closest("[data-check]") ||
                        e.target.closest("[data-plant]") ||
                        e.target.closest("[data-subtask-toggle]")) {
                        e.preventDefault();
                        return;
                    }
                    dragTaskId = +card.dataset.id;
                    card.classList.add("dragging");
                    if (e.dataTransfer) {
                        e.dataTransfer.effectAllowed = "move";
                        try { e.dataTransfer.setData("text/plain", String(dragTaskId)); } catch { /* ignore */ }
                    }
                });
                card.addEventListener("dragend", () => {
                    card.classList.remove("dragging");
                    dragTaskId = null;
                    list.querySelectorAll(".matrix-quadrant.drag-over").forEach(q => q.classList.remove("drag-over"));
                });
            });

            list.querySelectorAll(".matrix-quadrant").forEach(quad => {
                quad.addEventListener("dragover", e => {
                    if (dragTaskId === null) return;
                    e.preventDefault();
                    if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
                    quad.classList.add("drag-over");
                });
                quad.addEventListener("dragleave", e => {
                    if (e.target === quad) quad.classList.remove("drag-over");
                });
                quad.addEventListener("drop", e => {
                    e.preventDefault();
                    quad.classList.remove("drag-over");
                    if (dragTaskId === null) return;
                    setTaskQuadrant(dragTaskId, quad.dataset.quadrant);
                    dragTaskId = null;
                });
            });
        }

        // ===== Category sidebar UI =====
        function renderCategoryFilter() {
            const wrap = document.getElementById("categoryFilterChips");
            if (!wrap) return;
            const allActive = categoryFilters.size === 0;
            const allChip = `<button type="button" class="cat-chip${allActive ? " active" : ""}" data-cat-filter="__all">All</button>`;
            const chips = categories.map(c => {
                const active = categoryFilters.has(c.id);
                return `<button type="button" class="cat-chip${active ? " active" : ""}" data-cat-filter="${c.id}">
                    <span class="cat-chip-dot" style="background:${CATEGORY_COLORS[c.color] || CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR]}"></span>
                    ${escapeHtml(c.label)}
                </button>`;
            }).join("");
            wrap.innerHTML = allChip + chips;
            wrap.querySelectorAll("[data-cat-filter]").forEach(btn => {
                btn.addEventListener("click", () => {
                    const v = btn.dataset.catFilter;
                    if (v === "__all") {
                        categoryFilters.clear();
                    } else {
                        if (categoryFilters.has(v)) categoryFilters.delete(v);
                        else categoryFilters.add(v);
                    }
                    selected = null;
                    save();
                    render();
                });
            });
        }

        function renderCategoryManage() {
            const manageList = document.getElementById("catManageList");
            const manageWrap = document.getElementById("catManage");
            const toggle = document.getElementById("catManageToggle");
            if (!manageList || !manageWrap || !toggle) return;
            manageWrap.classList.toggle("collapsed", !catManageOpen);
            manageWrap.setAttribute("aria-hidden", !catManageOpen);
            toggle.setAttribute("aria-expanded", catManageOpen);
            toggle.classList.toggle("active", catManageOpen);
            toggle.textContent = catManageOpen ? "Done" : "Manage";

            manageList.innerHTML = categories.map(c => `
                <div class="cat-row" data-cat-row="${c.id}">
                    <button type="button" class="cat-row-color" data-cat-color="${c.id}"
                        style="background:${CATEGORY_COLORS[c.color] || CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR]}"
                        title="Change color" aria-label="Change color"></button>
                    <input type="text" class="cat-row-name" data-cat-name="${c.id}"
                        value="${escapeHtml(c.label)}" maxlength="24" />
                    <button type="button" class="cat-row-delete" data-cat-delete="${c.id}"
                        title="Delete category" aria-label="Delete category">×</button>
                </div>
            `).join("");

            manageList.querySelectorAll("[data-cat-color]").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.stopPropagation();
                    const id = btn.dataset.catColor;
                    if (catColorPopId === id) {
                        catColorPopId = null;
                        renderCategoryManage();
                        return;
                    }
                    catColorPopId = id;
                    const row = btn.closest(".cat-row");
                    const existing = row.querySelector(".cat-color-pop");
                    if (existing) existing.remove();
                    const c = getCategory(id);
                    const swatches = CATEGORY_COLOR_KEYS.map(k =>
                        `<button type="button" class="cat-color-swatch${c && c.color === k ? " active" : ""}"
                            data-cat-pick="${id}|${k}" style="background:${CATEGORY_COLORS[k]}"
                            aria-label="${k}"></button>`
                    ).join("");
                    row.insertAdjacentHTML("beforeend",
                        `<div class="cat-color-pop">${swatches}</div>`);
                    row.querySelectorAll("[data-cat-pick]").forEach(s => {
                        s.addEventListener("click", ev => {
                            ev.stopPropagation();
                            const [cid, ck] = s.dataset.catPick.split("|");
                            recolorCategory(cid, ck);
                            catColorPopId = null;
                            renderCategoryManage();
                            renderCategoryFilter();
                            renderCategoryChip();
                            render();
                        });
                    });
                });
            });

            manageList.querySelectorAll("[data-cat-name]").forEach(inp => {
                let lastVal = inp.value;
                inp.addEventListener("focus", () => { lastVal = inp.value; });
                inp.addEventListener("keydown", e => {
                    if (e.key === "Enter") { e.preventDefault(); inp.blur(); }
                    if (e.key === "Escape") { inp.value = lastVal; inp.blur(); }
                });
                inp.addEventListener("blur", () => {
                    const id = inp.dataset.catName;
                    const c = getCategory(id);
                    if (!c) return;
                    const v = inp.value.trim();
                    if (!v || v === c.label) {
                        inp.value = c.label;
                        return;
                    }
                    renameCategory(id, v);
                    inp.value = (getCategory(id) || c).label;
                    renderCategoryFilter();
                    renderCategoryChip();
                    render();
                });
            });

            manageList.querySelectorAll("[data-cat-delete]").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.stopPropagation();
                    const id = btn.dataset.catDelete;
                    const c = getCategory(id);
                    if (!c) return;
                    deleteCategoryById(id);
                    catColorPopId = null;
                    renderCategoryManage();
                    renderCategoryFilter();
                    renderCategoryChip();
                    render();
                });
            });
        }

        function renderCategoryChip() {
            const dot = document.getElementById("categoryChipDot");
            const labelEl = document.getElementById("categoryChipLabel");
            const c = getDefaultCategory();
            if (!c) return;
            if (dot) dot.style.background = CATEGORY_COLORS[c.color] || CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR];
            if (labelEl) labelEl.textContent = c.label;
        }

        function positionCategoryPopover() {
            const chip = document.getElementById("categoryChip");
            const pop = document.getElementById("categoryChipPopover");
            if (!chip || !pop) return;
            const rect = chip.getBoundingClientRect();
            const popHeight = pop.offsetHeight || 220;
            const popWidth = pop.offsetWidth || 220;
            // Default: position above the chip, right-aligned
            let top = rect.top - popHeight - 8;
            let right = window.innerWidth - rect.right;
            if (top < 8) {
                // Not enough space above; place below instead
                top = rect.bottom + 8;
                pop.style.transformOrigin = "top right";
            } else {
                pop.style.transformOrigin = "bottom right";
            }
            // Clamp right so popover stays in viewport
            right = Math.max(8, Math.min(right, window.innerWidth - popWidth - 8));
            pop.style.top = `${top}px`;
            pop.style.right = `${right}px`;
            pop.style.left = "";
        }

        function renderCategoryPopover() {
            const pop = document.getElementById("categoryChipPopover");
            if (!pop) return;
            const opts = categories.map(c => `
                <button type="button" class="category-chip-option${c.id === defaultCategoryId ? " active" : ""}"
                    data-cat-pick-default="${c.id}">
                    <span class="category-chip-option-dot" style="background:${CATEGORY_COLORS[c.color] || CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR]}"></span>
                    <span>${escapeHtml(c.label)}</span>
                </button>
            `).join("");
            const newRow = categoryChipNewMode
                ? `<div class="category-chip-new">
                        <input type="text" class="category-chip-new-input" id="categoryChipNewInput"
                            placeholder="New category name…" maxlength="24" autocomplete="off" />
                   </div>`
                : `<button type="button" class="category-chip-option" id="categoryChipNewToggle">
                        <span class="category-chip-option-dot" style="background:transparent;border:0.5px dashed rgba(255,255,255,0.4)"></span>
                        <span>+ New category</span>
                   </button>`;
            pop.innerHTML = `${opts}<div class="category-chip-divider"></div>${newRow}`;

            pop.querySelectorAll("[data-cat-pick-default]").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.stopPropagation();
                    setDefaultCategory(btn.dataset.catPickDefault);
                    closeCategoryChipPopover();
                    renderCategoryChip();
                });
            });

            const newToggle = pop.querySelector("#categoryChipNewToggle");
            if (newToggle) {
                newToggle.addEventListener("click", e => {
                    e.stopPropagation();
                    categoryChipNewMode = true;
                    renderCategoryPopover();
                    requestAnimationFrame(() => {
                        const inp = document.getElementById("categoryChipNewInput");
                        if (inp) inp.focus();
                        positionCategoryPopover();
                    });
                });
            }

            const newInp = pop.querySelector("#categoryChipNewInput");
            if (newInp) {
                newInp.addEventListener("click", e => e.stopPropagation());
                newInp.addEventListener("keydown", e => {
                    e.stopPropagation();
                    if (e.key === "Enter") {
                        const cat = createCategoryFromLabel(newInp.value);
                        if (cat) {
                            defaultCategoryId = cat.id;
                            save();
                            categoryChipNewMode = false;
                            closeCategoryChipPopover();
                            renderCategoryChip();
                            renderCategoryFilter();
                            renderCategoryManage();
                        }
                    } else if (e.key === "Escape") {
                        categoryChipNewMode = false;
                        renderCategoryPopover();
                    }
                });
            }
        }

        function openCategoryChipPopover() {
            const pop = document.getElementById("categoryChipPopover");
            const chip = document.getElementById("categoryChip");
            if (!pop || !chip) return;
            categoryChipOpen = true;
            categoryChipNewMode = false;
            renderCategoryPopover();
            pop.classList.add("open");
            chip.setAttribute("aria-expanded", "true");
            requestAnimationFrame(positionCategoryPopover);
        }

        function closeCategoryChipPopover() {
            const pop = document.getElementById("categoryChipPopover");
            const chip = document.getElementById("categoryChip");
            if (!pop || !chip) return;
            categoryChipOpen = false;
            categoryChipNewMode = false;
            pop.classList.remove("open");
            chip.setAttribute("aria-expanded", "false");
        }

        function syncLayoutTabs() {
            document.querySelectorAll("[data-layout]").forEach(btn => {
                const active = btn.dataset.layout === taskLayout;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });
            list.classList.remove("layout-list", "layout-kanban", "layout-compact", "layout-eisenhower");
            list.classList.add(`layout-${taskLayout}`);
        }

        function todayActiveCount() {
            return tasks.filter(t => t.place === "today" && !t.done).length;
        }

        function greenhouseCount() {
            return tasks.filter(t => t.place === "greenhouse" && !t.done).length;
        }

        function canPlantMore() {
            return todayActiveCount() < TODAY_CAP;
        }

        function normalizePriority(p) {
            return PRIORITY_ORDER.includes(p) ? p : "med";
        }

        function sortByPriority(list) {
            return [...list].sort((a, b) => {
                const diff = PRIORITIES[normalizePriority(a.priority)].order
                    - PRIORITIES[normalizePriority(b.priority)].order;
                if (diff !== 0) return diff;
                return b.id - a.id;
            });
        }

        function closePriorityBloom() {
            if (priorityMenuId === null) return;
            const id = priorityMenuId;
            const bloom = list.querySelector(`.priority-bloom[data-bloom="${id}"]`);
            priorityMenuId = null;
            if (!bloom) return;
            bloom.classList.remove("is-open");
            bloom.classList.add("is-closing");
            const toggle = bloom.querySelector("[data-priority-toggle]");
            if (toggle) toggle.setAttribute("aria-expanded", "false");
            setTimeout(() => bloom.classList.remove("is-closing"), 320);
        }

        function togglePriorityBloom(id) {
            if (priorityMenuId === id) {
                closePriorityBloom();
                return;
            }
            if (priorityMenuId !== null) {
                const prev = list.querySelector(`.priority-bloom[data-bloom="${priorityMenuId}"]`);
                if (prev) {
                    prev.classList.remove("is-open", "is-closing");
                    prev.querySelector("[data-priority-toggle]")?.setAttribute("aria-expanded", "false");
                }
            }
            priorityMenuId = id;
            const bloom = list.querySelector(`.priority-bloom[data-bloom="${id}"]`);
            if (!bloom) return;
            bloom.classList.remove("is-closing");
            bloom.classList.add("is-open");
            bloom.querySelector("[data-priority-toggle]")?.setAttribute("aria-expanded", "true");
        }

        function reorderVisibleCardsIfNeeded() {
            if (taskLayout !== "list") return;
            const visible = getVisibleTasks();
            const targetOrder = visible.map(t => t.id);
            const cards = [...list.querySelectorAll(".task-card")];
            const currentOrder = cards.map(c => +c.dataset.id);
            if (targetOrder.join(",") === currentOrder.join(",")) return;

            const firstRects = new Map(cards.map(c => [+c.dataset.id, c.getBoundingClientRect()]));

            targetOrder.forEach(taskId => {
                const card = list.querySelector(`.task-card[data-id="${taskId}"]`);
                if (card) list.appendChild(card);
            });

            list.querySelectorAll(".task-card").forEach(card => {
                const taskId = +card.dataset.id;
                const before = firstRects.get(taskId);
                if (!before) return;
                const after = card.getBoundingClientRect();
                const dx = before.left - after.left;
                const dy = before.top - after.top;
                if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return;

                card.style.transition = "none";
                card.style.transform = `translate(${dx}px, ${dy}px)`;
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        card.style.transition = "transform 0.48s cubic-bezier(0.34, 1.2, 0.64, 1)";
                        card.style.transform = "";
                        const onEnd = () => {
                            card.style.transition = "";
                            card.removeEventListener("transitionend", onEnd);
                        };
                        card.addEventListener("transitionend", onEnd);
                    });
                });
            });
        }

        function refreshCardPriorityUI(card, task, p) {
            card.classList.remove("priority-high", "priority-med", "priority-low");
            card.classList.add(`priority-${p}`);

            const tag = card.querySelector(".task-tag");
            if (tag) {
                tag.innerHTML = taskTagInnerHtml(task, p);
                const pill = tag.querySelector(".subtask-pill");
                if (pill) {
                    pill.addEventListener("click", e => {
                        e.stopPropagation();
                        toggleSubtaskExpanded(task.id);
                    });
                }
            }

            const orb = card.querySelector(".priority-orb");
            if (orb) {
                orb.classList.remove("p-high", "p-med", "p-low", "is-settling");
                orb.classList.add(`p-${p}`, "is-settling");
                orb.setAttribute("aria-label", `Priority: ${PRIORITIES[p].label}. Change priority`);
                orb.title = PRIORITIES[p].label;
                setTimeout(() => orb.classList.remove("is-settling"), 520);
            }

            card.querySelectorAll(".priority-choice").forEach(btn => {
                btn.classList.toggle("is-current", btn.dataset.p === p);
            });

            card.classList.add("priority-pulse");
            setTimeout(() => card.classList.remove("priority-pulse"), 560);
        }

        function setTaskPriority(id, priority) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            const p = normalizePriority(priority);
            if (t.priority === p) {
                closePriorityBloom();
                return;
            }
            t.priority = p;
            save();
            closePriorityBloom();

            if (priorityFilter !== "all" && priorityFilter !== p) {
                render();
                return;
            }

            if (taskLayout === "kanban" || taskLayout === "eisenhower") {
                render();
                if (selected === id) syncSelectedPriorityPills(p);
                return;
            }

            const card = list.querySelector(`.task-card[data-id="${id}"]`);
            if (!card) {
                render();
                return;
            }

            refreshCardPriorityUI(card, t, p);
            reorderVisibleCardsIfNeeded();

            if (selected === id) syncSelectedPriorityPills(p);
        }

        function priorityPillsHtml(activeP, dataAttr) {
            return PRIORITY_ORDER.map(p =>
                `<button type="button" class="priority-pill${p === activeP ? " active" : ""}" data-${dataAttr}="${p}">${PRIORITIES[p].label}</button>`
            ).join("");
        }

        function syncSelectedPriorityPills(priority) {
            const wrap = document.getElementById("selectedPriorityPills");
            if (!wrap) return;
            const p = normalizePriority(priority);
            wrap.innerHTML = priorityPillsHtml(p, "set-priority");
            wrap.querySelectorAll(".priority-pill").forEach(btn => {
                btn.addEventListener("click", () => {
                    if (selected) setTaskPriority(selected, btn.dataset.setPriority);
                });
            });
        }

        function showToast(msg) {
            const el = document.getElementById("toast");
            el.textContent = msg;
            el.classList.add("show");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
        }

        function setGreeting() {
            const h = new Date().getHours();
            let text = "Good evening 🌙";
            if (h < 12) text = "Good morning ☀️";
            else if (h < 17) text = "Good afternoon 🌤️";
            greeting.textContent = text;
        }

        function updateChrome() {
            const isGh = view === "greenhouse";
            document.body.classList.toggle("mode-greenhouse", isGh);
            soilMeter.classList.toggle("hidden", isGh);
            ghHint.classList.toggle("hidden", !isGh);
            todayFilters.classList.toggle("hidden", isGh);

            ghBadge.textContent = String(greenhouseCount());

            const active = todayActiveCount();
            soilMeter.classList.toggle("full", active >= TODAY_CAP);
            soilLabel.textContent = active >= TODAY_CAP
                ? "Garden full"
                : `${active} of ${TODAY_CAP} plots`;

            soilDots.innerHTML = Array.from({ length: TODAY_CAP }, (_, i) =>
                `<span class="soil-dot${i < active ? " filled" : ""}"></span>`
            ).join("");

            pageTitle.innerHTML = isGh
                ? 'The <span>Greenhouse</span>'
                : 'Today\'s <span>Garden</span>';

            input.placeholder = isGh
                ? (canPlantMore() ? "Store a seed for later…" : "Garden full — seeds wait here…")
                : (canPlantMore() ? "Add a new task…" : "Garden full — goes to greenhouse…");

            document.querySelectorAll(".view-tab").forEach(tab => {
                tab.classList.toggle("active", tab.dataset.view === view);
            });

            updateActionBar();
        }

        function updateActionBar() {
            const t = selected ? tasks.find(x => x.id === selected) : null;
            const priorityRow = document.getElementById("priorityActionRow");
            if (!t) {
                actionBar.classList.add("hidden");
                priorityRow.classList.add("hidden");
                return;
            }
            actionBar.classList.remove("hidden");
            priorityRow.classList.remove("hidden");
            syncSelectedPriorityPills(t.priority);

            const shelve = document.getElementById("actShelve");
            const plant = document.getElementById("actPlant");
            const del = document.getElementById("actDelete");

            if (view === "today") {
                shelve.style.display = t.done ? "none" : "";
                plant.style.display = "none";
                shelve.textContent = "Shelve";
            } else {
                shelve.style.display = "none";
                plant.style.display = "";
                plant.disabled = !canPlantMore();
                plant.textContent = canPlantMore() ? "Plant today" : "Garden full";
            }
            del.style.display = "";
        }

        function moveToGreenhouse(id) {
            const t = tasks.find(x => x.id === id);
            if (!t || t.place === "greenhouse") return;
            t.place = "greenhouse";
            selected = null;
            priorityMenuId = null;
            save();
            showToast("Moved to the greenhouse");
            render();
        }

        function moveToToday(id) {
            const t = tasks.find(x => x.id === id);
            if (!t || t.place === "today") return;
            if (!canPlantMore()) {
                showToast("Today's garden is full — shelve a task first");
                return false;
            }
            t.place = "today";
            selected = null;
            priorityMenuId = null;
            save();
            showToast("Planted in today's garden");
            render();
            return true;
        }

        function removeTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            if (selected === id) selected = null;
            priorityMenuId = null;
            save();
            showToast("Task removed");
            render();
        }

        function priorityControlHtml(taskId, priority) {
            const p = normalizePriority(priority);
            const menuOpen = priorityMenuId === taskId;
            const choices = PRIORITY_ORDER.map((pr, i) => `
                <button type="button" class="priority-choice p-${pr}${pr === p ? " is-current" : ""}"
                    data-p="${pr}" data-choose-priority="${taskId}" role="menuitem"
                    style="--i:${i}" aria-label="${PRIORITIES[pr].label}">
                    <span class="priority-choice-glow p-${pr}" aria-hidden="true"></span>
                    <span>${PRIORITIES[pr].label}</span>
                </button>
            `).join("");
            return `<div class="priority-bloom${menuOpen ? " is-open" : ""}" data-bloom="${taskId}">
                <button type="button" class="priority-orb p-${p}" data-priority-toggle="${taskId}"
                    aria-label="Priority: ${PRIORITIES[p].label}. Change priority"
                    aria-expanded="${menuOpen}" aria-haspopup="true" title="${PRIORITIES[p].label}">
                    <span class="priority-orb-ring" aria-hidden="true"></span>
                    <span class="priority-orb-core" aria-hidden="true"></span>
                </button>
                <div class="priority-tray" role="menu" data-tray="${taskId}">${choices}</div>
            </div>`;
        }

        function taskTagInnerHtml(task, p) {
            const cat = getCategory(task.categoryId) || getDefaultCategory();
            const color = cat ? (CATEGORY_COLORS[cat.color] || CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR]) : CATEGORY_COLORS[DEFAULT_CATEGORY_COLOR];
            const label = cat ? cat.label : DEFAULT_CATEGORY_LABEL;
            return `<span class="task-cat-dot" style="background:${color}" aria-hidden="true"></span>` +
                `<span class="task-cat-label">${escapeHtml(label)}</span>` +
                ` · <span class="task-tag-priority">${PRIORITIES[p].label}</span>` +
                subtaskPillHtml(task);
        }

        function renderTaskCard(t, opts) {
            const isGh = opts.inGreenhouse;
            const compact = !!opts.compact;
            const sel = selected === t.id;
            const p = normalizePriority(t.priority);
            const priorityClass = ` priority-${p}`;
            const compactClass = compact ? " compact-card" : "";
            const expanded = expandedSubtasks.has(t.id);
            const expandedClass = expanded ? " subtasks-expanded" : "";

            if (isGh) {
                return `<div class="task-card gh-card${priorityClass}${compactClass}${expandedClass}${sel ? " selected" : ""}" data-id="${t.id}">
                    <div class="seedling" aria-hidden="true">🌱</div>
                    <div class="task-body">
                        <div class="task-tag">${taskTagInnerHtml(t, p)}</div>
                        <div class="task-title">${escapeHtml(t.title)}</div>
                    </div>
                    ${priorityControlHtml(t.id, p)}
                    <button type="button" class="card-plant-btn" data-plant="${t.id}" ${canPlantMore() ? "" : "disabled"}>Plant</button>
                    ${subtaskRegionHtml(t)}
                </div>`;
            }

            return `<div class="task-card${priorityClass}${compactClass}${expandedClass}${t.done ? " done" : ""}${sel ? " selected" : ""}" data-id="${t.id}">
                <div class="check-wrap${t.done ? " checked" : ""}" data-check="${t.id}">
                    <svg class="check-icon" viewBox="0 0 16 16"><polyline points="2.5,8.5 6.5,12.5 13.5,4.5"/></svg>
                </div>
                <div class="task-body">
                    <div class="task-tag">${taskTagInnerHtml(t, p)}</div>
                    <div class="task-title">${escapeHtml(t.title)}</div>
                </div>
                ${priorityControlHtml(t.id, p)}
                ${subtaskRegionHtml(t)}
            </div>`;
        }

        function applyPriorityFilter(list) {
            if (priorityFilter === "all") return list;
            return list.filter(t => normalizePriority(t.priority) === priorityFilter);
        }

        function syncPriorityFilterButtons() {
            document.querySelectorAll("[data-priority-filter]").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.priorityFilter === priorityFilter);
            });
        }

        function renderKanbanBoard(visible) {
            const inGh = view === "greenhouse";
            const cols = priorityFilter === "all" ? PRIORITY_ORDER : [priorityFilter];
            const byPriority = Object.fromEntries(PRIORITY_ORDER.map(p => [p, []]));
            visible.forEach(t => byPriority[normalizePriority(t.priority)].push(t));

            const colClass = cols.length === 1 ? " cols-1" : "";
            const columns = cols.map(p => {
                const items = byPriority[p];
                const cards = items.length
                    ? items.map(t => renderTaskCard(t, { inGreenhouse: inGh, compact: false })).join("")
                    : `<div class="kanban-empty">Empty</div>`;
                return `<section class="kanban-col priority-${p}" aria-label="${PRIORITIES[p].label} priority">
                    <header class="kanban-col-head">
                        <span class="kanban-col-title">${PRIORITIES[p].label}</span>
                        <span class="kanban-col-count">${items.length}</span>
                    </header>
                    <div class="kanban-col-body">${cards}</div>
                </section>`;
            }).join("");

            return `<div class="kanban-board${colClass}">${columns}</div>`;
        }

        function applyCategoryFilter(list) {
            if (categoryFilters.size === 0) return list;
            return list.filter(t => categoryFilters.has(t.categoryId));
        }

        function getVisibleTasks() {
            let subset;
            if (view === "greenhouse") {
                subset = tasks.filter(t => t.place === "greenhouse" && !t.done);
            } else {
                subset = tasks.filter(t => t.place === "today");
                if (filter === "active") subset = subset.filter(t => !t.done);
                else if (filter === "done") subset = subset.filter(t => t.done);
            }
            subset = applyPriorityFilter(subset);
            subset = applyCategoryFilter(subset);
            return sortByPriority(subset);
        }

        function bindListEvents() {
            list.querySelectorAll(".task-card").forEach(card => {
                card.addEventListener("click", e => {
                    if (e.target.closest("[data-check]") || e.target.closest("[data-plant]") ||
                        e.target.closest(".priority-bloom") ||
                        e.target.closest("[data-subtask-toggle]") ||
                        e.target.closest(".subtask-region")) return;
                    const id = +card.dataset.id;
                    selected = selected === id ? null : id;
                    closePriorityBloom();
                    render();
                });
                const t = tasks.find(x => x.id === +card.dataset.id);
                if (t) bindSubtaskEvents(card, t);
            });

            list.querySelectorAll("[data-subtask-toggle]").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.stopPropagation();
                    toggleSubtaskExpanded(+btn.dataset.subtaskToggle);
                });
            });

            list.querySelectorAll("[data-check]").forEach(chk => {
                chk.addEventListener("click", e => {
                    e.stopPropagation();
                    const t = tasks.find(x => x.id === +chk.dataset.check);
                    if (!t) return;
                    t.done = !t.done;
                    save();
                    if (selected === t.id) selected = null;

                    if (filter === "active" && t.done && view === "today") {
                        const card = chk.closest(".task-card");
                        card.style.animation = "none";
                        card.style.transform = "translateY(0)";
                        const titleEl = card.querySelector(".task-title");
                        titleEl.style.textDecoration = "line-through";
                        titleEl.style.color = "rgba(120,150,130,0.45)";
                        setTimeout(() => {
                            card.classList.add("dismissing");
                            setTimeout(() => render(), 620);
                        }, 420);
                    } else {
                        render();
                    }
                });
            });

            list.querySelectorAll("[data-priority-toggle]").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.stopPropagation();
                    togglePriorityBloom(+btn.dataset.priorityToggle);
                });
            });

            list.querySelectorAll("[data-choose-priority]").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.stopPropagation();
                    setTaskPriority(+btn.dataset.choosePriority, btn.dataset.p);
                });
            });

            list.querySelectorAll("[data-plant]").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.stopPropagation();
                    moveToToday(+btn.dataset.plant);
                });
            });

            if (taskLayout === "eisenhower") {
                bindMatrixEvents();
            }
        }

        function render() {
            updateChrome();
            syncPriorityFilterButtons();
            syncLayoutTabs();
            renderCategoryFilter();
            renderCategoryManage();
            renderCategoryChip();

            const visible = getVisibleTasks();
            const inGh = view === "greenhouse";

            if (!visible.length) {
                let emptyMsg = view === "greenhouse"
                    ? "No seeds in the greenhouse.<br>Add tasks here when today's garden is full."
                    : filter === "done"
                        ? "Nothing harvested yet today."
                        : filter === "active"
                            ? "Your garden is clear — plant something new."
                            : "No tasks in today's garden.";
                if (priorityFilter !== "all") {
                    emptyMsg = `No ${PRIORITIES[priorityFilter].label.toLowerCase()} priority tasks here.`;
                }
                if (categoryFilters.size > 0) {
                    emptyMsg = "No tasks match the selected categories.";
                }
                if (taskLayout === "kanban" && priorityFilter === "all" && categoryFilters.size === 0) {
                    list.innerHTML = renderKanbanBoard([]);
                } else if (taskLayout === "eisenhower") {
                    list.innerHTML = renderEisenhowerMatrix([]);
                } else {
                    list.innerHTML = `<div class="empty">${emptyMsg}</div>`;
                }
                bindListEvents();
                return;
            }

            if (taskLayout === "kanban") {
                list.innerHTML = renderKanbanBoard(visible);
            } else if (taskLayout === "eisenhower") {
                list.innerHTML = renderEisenhowerMatrix(visible);
            } else if (taskLayout === "compact") {
                list.innerHTML = visible.map(t =>
                    renderTaskCard(t, { inGreenhouse: inGh, compact: true })
                ).join("");
            } else {
                list.innerHTML = visible.map(t =>
                    renderTaskCard(t, { inGreenhouse: inGh, compact: false })
                ).join("");
            }
            bindListEvents();
        }

        document.querySelectorAll(".view-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                view = tab.dataset.view;
                selected = null;
                priorityMenuId = null;
                render();
            });
        });

        document.querySelectorAll("[data-filter]").forEach(btn => {
            btn.addEventListener("click", () => {
                filter = btn.dataset.filter;
                selected = null;
                document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                render();
            });
        });

        document.querySelectorAll("[data-priority-filter]").forEach(btn => {
            btn.addEventListener("click", () => {
                priorityFilter = btn.dataset.priorityFilter;
                selected = null;
                priorityMenuId = null;
                render();
            });
        });

        document.querySelectorAll("[data-layout]").forEach(btn => {
            btn.addEventListener("click", () => {
                const next = btn.dataset.layout;
                if (!TASK_LAYOUTS.includes(next) || next === taskLayout) return;
                taskLayout = next;
                closePriorityBloom();
                save();
                render();
            });
        });

        document.getElementById("catManageToggle").addEventListener("click", () => {
            catManageOpen = !catManageOpen;
            save();
            renderCategoryManage();
        });

        document.getElementById("catAddInput").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                const inp = e.currentTarget;
                const v = inp.value;
                if (!v.trim()) return;
                const cat = createCategoryFromLabel(v);
                if (cat) {
                    save();
                    inp.value = "";
                    renderCategoryFilter();
                    renderCategoryManage();
                    renderCategoryChip();
                }
            } else if (e.key === "Escape") {
                e.currentTarget.value = "";
                e.currentTarget.blur();
            }
        });

        document.getElementById("categoryChip").addEventListener("click", e => {
            e.stopPropagation();
            if (categoryChipOpen) closeCategoryChipPopover();
            else openCategoryChipPopover();
        });

        document.addEventListener("click", e => {
            if (!categoryChipOpen) return;
            if (e.target.closest("#categoryChipPopover") || e.target.closest("#categoryChip")) return;
            closeCategoryChipPopover();
        });

        document.addEventListener("click", e => {
            if (catColorPopId === null) return;
            if (e.target.closest(".cat-color-pop") || e.target.closest("[data-cat-color]")) return;
            catColorPopId = null;
            renderCategoryManage();
        });

        window.addEventListener("resize", () => {
            if (categoryChipOpen) positionCategoryPopover();
        });
        window.addEventListener("scroll", () => {
            if (categoryChipOpen) positionCategoryPopover();
        }, { passive: true });

        document.addEventListener("keydown", e => {
            if (e.key === "Escape" && categoryChipOpen) {
                closeCategoryChipPopover();
            }
        });

        function addTask() {
            const v = input.value.trim();
            if (!v) return;

            const inGreenhouseView = view === "greenhouse";
            const gardenFull = !canPlantMore();
            let place = "today";

            if (inGreenhouseView || gardenFull) {
                place = "greenhouse";
                if (!inGreenhouseView && gardenFull) {
                    showToast("Garden full — seed stored in greenhouse");
                }
            }

            const cat = getDefaultCategory();
            tasks.unshift({
                id: nextId++,
                title: v,
                priority: "med",
                done: false,
                place,
                urgency: "urgent",
                importance: "important",
                subtasks: [],
                categoryId: cat ? cat.id : null,
            });
            input.value = "";
            save();

            if (place === "greenhouse" && !gardenFull && inGreenhouseView) {
                showToast("Seed stored in greenhouse");
            }

            if (view === "today" && place === "today") {
                filter = "active";
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                document.querySelector('[data-filter="active"]').classList.add("active");
            }

            selected = null;
            render();
        }

        document.getElementById("addBtn").addEventListener("click", addTask);
        input.addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });

        document.getElementById("actShelve").addEventListener("click", () => {
            if (selected) moveToGreenhouse(selected);
        });
        document.getElementById("actPlant").addEventListener("click", () => {
            if (selected) moveToToday(selected);
        });
        document.getElementById("actDelete").addEventListener("click", () => {
            if (selected) removeTask(selected);
        });

        document.addEventListener("click", e => {
            if (appTab !== "tasks") return;
            if (!e.target.closest(".priority-bloom") && priorityMenuId !== null) {
                closePriorityBloom();
            }
        });

        document.addEventListener("keydown", e => {
            if (e.key === "Escape" && priorityMenuId !== null) {
                closePriorityBloom();
            }
        });

        document.querySelectorAll(".app-nav-btn").forEach(btn => {
            btn.addEventListener("click", () => setAppTab(btn.dataset.app));
        });

        document.getElementById("focusMain").addEventListener("click", () => {
            if (timerState.running) pauseTimer();
            else startTimer();
        });
        document.getElementById("focusReset").addEventListener("click", resetTimer);
        document.getElementById("focusSkip").addEventListener("click", skipTimerPhase);

        document.querySelectorAll(".focus-dur-btn").forEach(btn => {
            btn.addEventListener("click", () => setWorkDuration(+btn.dataset.work));
        });

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && timerState.running && timerState.endsAt) {
                const left = Math.max(0, Math.ceil((timerState.endsAt - Date.now()) / 1000));
                timerState.secondsLeft = left;
                if (left <= 0) onTimerPhaseComplete();
                else updateTimerUI();
            }
        });

        load();
        setGreeting();
        initFocus();
        render();
    </script>
</body>

</html>
